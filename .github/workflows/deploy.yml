name: 🚀 cafe24 자동 배포

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'data/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 다운로드
        uses: actions/checkout@v4

      - name: 📤 cafe24에 배포
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./src/
          server-dir: /public_html/dronetest/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false

      - name: ✅ 배포 완료 알림
        if: success()
        run: |
          echo "✅ cafe24에 배포가 완료되었습니다!"
          echo "🌐 http://staff4.cafe24.com/dronetest/"

      - name: ❌ 배포 실패 알림
        if: failure()
        run: |
          echo "❌ 배포 중 오류가 발생했습니다"
          echo "확인사항:"
          echo "1. GitHub Secrets이 설정되었는지 확인"
          echo "   - FTP_HOST = ftp.cafe24.com"
          echo "   - FTP_USER = staff4"
          echo "   - FTP_PASSWORD = army9238!@"
          echo "2. cafe24 FTP 접근 권한 확인"
          echo "3. GitHub Actions 로그 확인"
