name: 🚀 cafe24 자동 배포

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'data/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 코드 다운로드
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📤 cafe24 FTP 배포
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: ftp
          remote-host: ${{ secrets.FTP_HOST }}
          remote-port: 21
          remote-user: ${{ secrets.FTP_USER }}
          remote-password: ${{ secrets.FTP_PASSWORD }}
          local-path: ./src/
          remote-path: /public_html/dronetest/
          sync: true
          ftp-options: --timeout=600

      - name: ✅ 배포 성공
        if: success()
        run: |
          echo "✅ cafe24에 배포가 완료되었습니다!"
          echo "🌐 http://staff4.cafe24.com/dronetest/"

      - name: ❌ 배포 실패
        if: failure()
        run: |
          echo "❌ 배포 실패"
          echo ""
          echo "🔍 확인사항:"
          echo "1. GitHub Secrets 확인"
          echo "   - FTP_HOST = ftp.cafe24.com"
          echo "   - FTP_USER = staff4"
          echo "   - FTP_PASSWORD = army9238!@"
          echo ""
          echo "2. cafe24 FTP 접근 확인"
          echo "3. Actions 로그에서 상세 오류 확인"
